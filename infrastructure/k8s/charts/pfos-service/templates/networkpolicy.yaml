{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "pfos-service.fullname" . }}
  labels:
    {{- include "pfos-service.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "pfos-service.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector: {}
  egress:
    - to:
        - namespaceSelector: {}
      # Default deny can be tightened per service, this is a basic secure baseline
{{- end }}
