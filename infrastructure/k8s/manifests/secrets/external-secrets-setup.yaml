# 1. SecretStore for AWS Secrets Manager
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secretsmanager
  namespace: default
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: pfos-external-secrets-sa

---
# 2. Example ExternalSecret definition pattern for a PFOS service
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: pfos-database-credentials
  namespace: default
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: aws-secretsmanager
    kind: SecretStore
  target:
    name: pfos-database-secret # The Kubernetes Secret to be created
    creationPolicy: Owner
  data:
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: pfos/prod/rds/pfos-db-prod-credentials
        property: password
    - secretKey: POSTGRES_USER
      remoteRef:
        key: pfos/prod/rds/pfos-db-prod-credentials
        property: username
