apiVersion: v1
kind: ConfigMap
metadata:
  name: pfos-platform-dashboard
  namespace: observability
  labels:
    grafana_dashboard: "1"
data:
  pfos-platform.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": "-- Grafana --",
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "target": {
              "limit": 100,
              "matchAny": false,
              "tags": [],
              "type": "dashboard"
            },
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "title": "API Request Rate (Mocked)",
          "type": "timeseries",
          "datasource": "Prometheus",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{job=~\"pfos.*\"}[5m])) by (job)",
              "legendFormat": "{{job}}"
            }
          ]
        },
        {
          "title": "Celery Task Queue Length",
          "type": "stat",
          "datasource": "Prometheus",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [
            {
              "expr": "sum(celery_queue_length)",
              "legendFormat": "Tasks Pending"
            }
          ]
        }
      ],
      "schemaVersion": 36,
      "style": "dark",
      "tags": ["pfos", "platform"],
      "templating": {
        "list": []
      },
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "",
      "title": "PFOS Executive Dashboard",
      "uid": "pfos-exec-01",
      "version": 1
    }
