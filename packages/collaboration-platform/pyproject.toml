[project]
name = "collaboration-platform"
version = "0.1.0"
description = "Enterprise Collaboration, Household & Advisor Platform"
authors = [
    { name = "Admin", email = "admin@example.com" }
]
dependencies = [
    "fastapi>=0.109.0",
    "uvicorn[standard]>=0.27.0",
    "sqlalchemy>=2.0.25",
    "pydantic>=2.5.3",
    "pydantic-settings>=2.1.0",
    "alembic>=1.13.1",
    "psycopg2-binary>=2.9.9",
    "redis>=5.0.1",
    "opentelemetry-api>=1.22.0",
    "opentelemetry-sdk>=1.22.0",
    "opentelemetry-instrumentation-fastapi>=0.43b0",
    "opentelemetry-instrumentation-sqlalchemy>=0.43b0",
    "observability-platform",
    "governance-platform"
]
readme = "README.md"
requires-python = ">= 3.11"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
addopts = "--import-mode=importlib -v --cov=collaboration_platform"
testpaths = ["tests"]

[tool.hatch.metadata]
allow-direct-references = true

[tool.uv.sources]
observability-platform = { workspace = true }
governance-platform = { workspace = true }
