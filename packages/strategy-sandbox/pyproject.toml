[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "strategy-sandbox"
version = "0.1.0"
description = "Enterprise Strategy Sandbox & Validation Platform"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.111.0",
    "uvicorn>=0.30.0",
    "pydantic>=2.7.0",
    "pydantic-settings>=2.2.0",
    "sqlalchemy>=2.0.30",
    "psycopg2-binary>=2.9.9",
    "alembic>=1.13.1",
    "redis>=5.0.4",
    "celery>=5.4.0",
    "opentelemetry-api>=1.24.0",
    "opentelemetry-sdk>=1.24.0",
    "opentelemetry-instrumentation-fastapi>=0.45b0",
    "pgvector>=0.2.5",
    "polars>=0.20.26",
    "numpy>=1.26.4",
    "scipy>=1.13.1",
    "ortools>=9.10.4067",
    "litellm>=1.40.15",
]
