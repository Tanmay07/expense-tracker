[project]
name = "mission-control-bff"
version = "0.1.0"
description = "Backend for Frontend (BFF) for Mission Control OS"
authors = [{ name = "Tanmay Adhikary", email = "tanmayadhikary@example.com" }]
dependencies = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.31.0",
    "httpx>=0.27.2",
    "redis>=5.1.1",
    "pydantic>=2.9.0",
    "websockets>=13.1",
]
readme = "README.md"
requires-python = ">= 3.8"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src"]
