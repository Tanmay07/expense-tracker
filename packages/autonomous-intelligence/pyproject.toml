[project]
name = "autonomous-intelligence"
version = "0.1.0"
description = "Enterprise Autonomous Financial Intelligence Platform (Phase 12)"
authors = [
    { name = "Platform Team", email = "platform@example.com" }
]
dependencies = [
    "fastapi>=0.109.0",
    "uvicorn[standard]>=0.27.0",
    "sqlalchemy>=2.0.25",
    "pydantic>=2.5.3",
    "pydantic-settings>=2.1.0",
    "alembic>=1.13.1",
    "psycopg2-binary>=2.9.9",
    "redis>=5.0.1",
    "celery>=5.3.6",
    "opentelemetry-api>=1.22.0",
    "opentelemetry-sdk>=1.22.0",
    "opentelemetry-instrumentation-fastapi>=0.43b0",
    "litellm>=1.28.0",
    "pgvector>=0.2.4",
    "asyncpg>=0.29.0",
    "httpx>=0.27.0"
]
readme = "README.md"
requires-python = ">= 3.11"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
addopts = "--import-mode=importlib -v --cov=autonomous_intelligence"
testpaths = ["tests"]
