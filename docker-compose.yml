  collaboration-platform:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.python.dev
    command: ["uv", "run", "uvicorn", "collaboration_platform.api.main:app", "--host", "0.0.0.0", "--port", "8023", "--reload"]
