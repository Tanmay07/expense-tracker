    environment:
      - APP_ENV=development
      - LOG_LEVEL=DEBUG
      - REDIS_URL=redis://redis:6379/0
      - COLLABORATION_DB_URL=postgresql+asyncpg://ledger_user:ledger_password@db:5432/finance_ledger
    depends_on:
      - db
      - redis
    profiles:
      - collaboration
      - full

