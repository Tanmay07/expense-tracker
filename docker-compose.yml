version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ledger_user
      POSTGRES_PASSWORD: ledger_password
      POSTGRES_DB: finance_ledger
    ports:
    - 5432:5432
    volumes: null
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U ledger_user -d finance_ledger
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
    - db
  validation_artifacts:
  - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7
    ports:
    - 6379:6379
    healthcheck:
      test:
      - CMD
      - redis-cli
      - ping
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
    - db
volumes:
  validation_artifacts: null
  postgres_data: null
  enterprise-compliance:
    build:
      context: ./packages/enterprise-compliance
    ports:
    - 8002:8000
    environment:
      DATABASE_URL: postgresql://ledger_user:ledger_password@db:5432/finance_ledger
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
    - db
    - redis
  compliance-worker:
    build:
      context: ./packages/enterprise-compliance
    command: celery -A enterprise_compliance.application.tasks worker --loglevel=info
    environment:
      DATABASE_URL: postgresql://ledger_user:ledger_password@db:5432/finance_ledger
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
    - db
    - redis
