version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ledger_user
      POSTGRES_PASSWORD: ledger_password
      POSTGRES_DB: finance_ledger
    ports:
      - "5432:5432"
    volumes:
  validation_artifacts:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  validation_artifacts:
  postgres_data:

  enterprise-compliance:
    build:
      context: ./packages/enterprise-compliance
    ports:
      - "8002:8000"
    environment:
      DATABASE_URL: postgresql://ledger_user:ledger_password@db:5432/finance_ledger
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis

  compliance-worker:
    build:
      context: ./packages/enterprise-compliance
    command: celery -A enterprise_compliance.application.tasks worker --loglevel=info
    environment:
      DATABASE_URL: postgresql://ledger_user:ledger_password@db:5432/finance_ledger
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis

  ai-coach-api:
    build:
      context: ./packages/ai-financial-coach
    ports:
      - "8003:8000"
    environment:
      DATABASE_URL: postgresql://ledger_user:ledger_password@db:5432/finance_ledger
      CELERY_BROKER_URL: redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY:-mock}
    depends_on:
      - db
      - redis

