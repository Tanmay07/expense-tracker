name: Frontend CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'packages/mission-control-ui/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'packages/mission-control-ui/**'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./packages/mission-control-ui
        
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: packages/mission-control-ui/package-lock.json
        
    - name: Install Dependencies
      run: npm ci
      
    - name: Lint
      run: npm run lint
      
    - name: Type Check
      run: npx tsc --noEmit
      
    # - name: Test (Uncomment when Jest is setup)
    #   run: npm test
      
    - name: Build
      run: npm run build
